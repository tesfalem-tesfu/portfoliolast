services:
  # Backend Service
  - type: web
    name: portfolio-backend
    env: node
    buildCommand: 'npm install'
    startCommand: 'npm start'
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 10000
      # Database Configuration (will be set in Render dashboard)
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      # Security
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Email (optional)
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

databases:
  # MySQL Database
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user
